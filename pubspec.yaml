name: uot_cs
description: UOT Smart Campus and Live Location Tracker Mobile App in Flutter.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.6.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  http: ^1.2.0
  intl: ^0.19.0
  flutter_markdown: ^0.7.1
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^19.5.0
  flutter_callkit_incoming: ^3.1.3
  uuid: ^4.6.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/profile.jpg
    - assets/campus_isometric.png


